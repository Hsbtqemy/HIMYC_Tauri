name: Release HIMYC

# Déclenché sur un push de tag v* (ex: v0.1.0, v1.2.3)
# Produit .app/.dmg (macOS), .exe/.msi (Windows), .deb/.AppImage (Linux)
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write   # nécessaire pour créer la GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin --config src-tauri/tauri.release.unix.conf.json"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            label: macOS
          - platform: windows-latest
            args: "--config src-tauri/tauri.release.conf.json"
            rust_targets: ""
            label: Windows
          - platform: ubuntu-22.04
            args: "--config src-tauri/tauri.release.unix.conf.json"
            rust_targets: ""
            label: Linux

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS : on compile en universal binary (Intel + Apple Silicon)
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── Dépendances système Linux ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -y || (sleep 10 && sudo apt-get update -y)
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Sidecar PyInstaller ────────────────────────────────────────────────
      - name: Build Python sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api]" pyinstaller
          python -m PyInstaller himyc-backend.spec --noconfirm

      - name: Build Python sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        working-directory: backend
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[api]" pyinstaller
          python3 -m PyInstaller himyc-backend.spec --noconfirm

      - name: Build Python sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: backend
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[api]" pyinstaller
          python3 -m PyInstaller himyc-backend.spec --noconfirm

      # ── Dépendances npm ────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Tests TypeScript ───────────────────────────────────────────────────
      - name: Run TypeScript tests
        run: npm test

      # ── Build Tauri ────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HIMYC ${{ github.ref_name }}"
          releaseBody: |
            ## HIMYC ${{ github.ref_name }}

            ### Téléchargements

            | Plateforme | Fichier | Notes |
            |---|---|---|
            | macOS (Apple Silicon) | `.dmg` | Backend Python intégré — aucun prérequis |
            | Windows | `_x64-setup.exe` ou `.msi` | Backend Python intégré — aucun prérequis |
            | Linux | `.AppImage` | Backend Python intégré — aucun prérequis |
            | Linux | `.deb` | Backend Python intégré — aucun prérequis |

            ### Aucun prérequis sur toutes les plateformes

            Le backend Python (uvicorn + howimetyourcorpus) est compilé et embarqué dans chaque installeur grâce à PyInstaller. Aucune installation Python requise.

            > **macOS Intel** : le sidecar embarqué est arm64. Sur un Mac Intel, l'app utilise automatiquement le Python système en fallback (`pip install howimetyourcorpus` requis).

            ### macOS — application non signée (pilote interne)

            Au premier lancement, macOS bloquera l'app. Deux options :
            - **Clic-droit → Ouvrir** sur le `.app` ou le `.dmg`, puis confirmer.
            - Ou en terminal : `xattr -cr /Applications/HIMYC.app`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
