name: Release HIMYC

# Déclenché sur un push de tag v* (ex: v0.1.0, v1.2.3)
# Produit .app/.dmg (macOS), .exe/.msi (Windows), .deb/.AppImage (Linux)
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write   # nécessaire pour créer la GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --target x86_64-apple-darwin"
            label: macOS
          - platform: windows-latest
            args: ""
            label: Windows
          - platform: ubuntu-22.04
            args: ""
            label: Linux

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS : on compile en universal binary (Intel + Apple Silicon)
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── Dépendances système Linux ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Dépendances npm ────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Tests TypeScript ───────────────────────────────────────────────────
      - name: Run TypeScript tests
        run: npm test

      # ── Build Tauri ────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HIMYC ${{ github.ref_name }}"
          releaseBody: |
            ## HIMYC ${{ github.ref_name }}

            ### Téléchargements

            | Plateforme | Fichier | Notes |
            |---|---|---|
            | macOS (Apple Silicon + Intel) | `.dmg` | Universal binary |
            | Windows | `_x64-setup.exe` ou `.msi` | |
            | Linux | `.AppImage` | Universel, pas d'installation |
            | Linux | `.deb` | Debian / Ubuntu |

            ### macOS — application non signée (pilote interne)

            Au premier lancement, macOS bloquera l'app. Deux options :
            - **Clic-droit → Ouvrir** sur le `.app` ou le `.dmg`, puis confirmer.
            - Ou en terminal : `xattr -cr /Applications/HIMYC.app`

            ### Backend Python requis

            Le backend HIMYC doit être lancé séparément :
            ```bash
            uvicorn howimetyourcorpus.api.server:app --host 127.0.0.1 --port 8765
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
