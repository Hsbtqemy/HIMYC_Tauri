<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIMYC</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; }
      /* Fixed shell header — always 44px tall, always on top */
      #shell-header { position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 9999; }
      /* Fixed sidebar — below header, left side */
      #shell-sidebar { position: fixed; top: 44px; left: 0; bottom: 0; width: 192px; z-index: 9990; }
      /* App content pushed below header and right of sidebar */
      html, body { height: 100%; margin: 0; }
      #app { padding-top: 44px; padding-left: 192px; height: 100vh; overflow: hidden; }
      @keyframes spin { to { transform: rotate(360deg) } }
    </style>
  </head>
  <body>
    <div id="startup-overlay" style="
      position:fixed;inset:0;overflow:hidden;
      background:#0f172a;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:99999;gap:14px;
    ">
      <!-- Hero image — révélation progressive pendant le poll backend -->
      <img id="startup-hero" src="/ted-barney.png" alt="" style="
        position:absolute;bottom:0;right:0;
        height:72%;width:auto;
        opacity:0;
        transition:opacity 0.5s ease;
        pointer-events:none;
        object-fit:contain;object-position:bottom right;
      ">
      <!-- Gradient latéral pour que le texte reste lisible -->
      <div style="
        position:absolute;inset:0;
        background:linear-gradient(to right, #0f172a 45%, rgba(15,23,42,0.3) 100%);
        pointer-events:none;
      "></div>

      <!-- Contenu overlay -->
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px">
        <div style="font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:1px">HIMYC</div>
        <div id="startup-status" style="color:#94a3b8;font-size:0.85rem;max-width:340px;text-align:center"></div>
        <div id="startup-spinner" style="
          width:28px;height:28px;border:3px solid rgba(255,255,255,0.15);
          border-top-color:#60a5fa;border-radius:50%;
          animation:spin 0.8s linear infinite;
        "></div>
        <div id="startup-error" style="display:none;color:#f87171;font-size:0.8rem;max-width:340px;text-align:center"></div>
        <button id="startup-pick-btn" style="display:none;margin-top:4px;
          padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:6px;
          font-size:0.875rem;font-weight:600;cursor:pointer">Choisir un projet…</button>
        <button id="startup-retry-btn" style="display:none;margin-top:4px;
          padding:6px 14px;background:transparent;color:#94a3b8;border:1px solid #334155;
          border-radius:6px;font-size:0.8rem;cursor:pointer">↺ Réessayer</button>
      </div>
    </div>
    <div id="shell-header"></div>
    <div id="shell-sidebar"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
