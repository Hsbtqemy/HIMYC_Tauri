<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIMYC</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; }
      /* Fixed shell header — always 44px tall, always on top */
      #shell-header { position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 9999; }
      /* App content pushed below the header — height: 100vh so children with height:100% work */
      html, body { height: 100%; margin: 0; }
      #app { padding-top: 44px; height: 100vh; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="shell-header"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
